<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>DFS Upside Engine 2.0</title>
  <link rel='stylesheet' href='/public/dashboard.css'>
</head>
<body>
<main class='shell'>
  <h1>DFS Upside Engine 2.0</h1>
  <section class='panel'>
    <h2>Admin Runner (Private)</h2>
    <input id='adminToken' placeholder='Admin API token' type='password'>
    <div class='fileGrid'>
      <label>Projection CSV <input id='csvFile' type='file' accept='.csv'></label>
      <label>Contest Entry File (optional) <input id='entryFile' type='file' accept='.csv'></label>
    </div>
    <div class='grid'>
      <input id='date' type='date'>
      <select id='sport'><option>NBA</option><option>NFL</option><option>MLB</option><option>MMA</option><option>GOLF</option><option>NASCAR</option></select>
      <select id='platform'><option>DraftKings</option><option>FanDuel</option></select>
      <select id='slateType'><option>Classic</option><option>Showdown</option></select>
      <select id='contestType'><option>Single Entry</option><option>3-Max</option><option>Small Field</option><option>Large Field GPP</option><option>Mini-MAX</option><option>Showdown</option></select>
      <input id='maxEntries' type='number' min='1' placeholder='Max entries allowed'>
      <input id='lineupsPlaying' type='number' min='1' placeholder='Lineups playing'>
      <input id='pctPaidToFirst' type='number' min='0' max='100' step='0.1' placeholder='% paid to first'>
    </div>
    <label><input id='showRaw' type='checkbox'> Show Raw Admin Data (Private)</label>
    <button id='runBtn'>Run DFS Upside Engine</button>
  </section>

  <section class='panel'>
    <h2>Public Output</h2>
    <div id='insights' class='insights' aria-live='polite'></div>
    <div class='filters'>
      <input id='search' placeholder='Search player'>
      <select id='tierFilter' aria-label='Tier filter'><option value=''>Tier: All</option></select>
      <select id='roleFilter' aria-label='Role filter'><option value=''>Role: All</option></select>
      <select id='contestFilter' aria-label='Contest filter'><option value=''>Contest: All</option></select>
      <select id='teamFilter' aria-label='Team filter'><option value=''>Team: All</option></select>
      <select id='sort' aria-label='Sort by'>
        <option value='classicScore'>Sort: Classic</option>
        <option value='confidenceRating'>Sort: Confidence</option>
        <option value='boomScore'>Sort: Boom Score</option>
        <option value='ownershipLeverageScore'>Sort: Leverage</option>
        <option value='captainScore'>Sort: Captain</option>
        <option value='flexScore'>Sort: Flex</option>
        <option value='eliteScore'>Sort: Elite Score</option>
        <option value='salary'>Sort: Salary</option>
      </select>
    </div>
    <div id='status'></div>
    <div class='tableWrap'><table><thead><tr><th data-sort='playerName'>Player</th><th>Slate</th><th>Team</th><th>Pos</th><th data-sort='salary'>Salary</th><th>Role</th><th>Contest Fit</th><th>Captain Tier</th><th>Environment</th><th data-sort='confidenceRating'>Conf</th><th data-sort='boomScore'>Boom</th><th data-sort='bustRisk'>Bust</th><th data-sort='ownershipLeverageScore'>Lev</th><th data-sort='classicScore'>Classic</th><th data-sort='captainScore'>Cap</th><th data-sort='flexScore'>Flex</th><th data-sort='eliteScore'>Elite</th><th>Value</th><th>Explanation</th></tr></thead><tbody id='body'></tbody></table></div><h2>Lineup Archetypes</h2><div id='lineupCards' class='lineupCards'></div>
  </section>
</main>
<script src='/public/dashboard.js'></script>
</body>
</html>
