<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DFS Upside Engine V1 Dashboard</title>
    <link rel="stylesheet" href="/public/dashboard.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">DFS Upside Engine V1</p>
          <h1>Dashboard</h1>
        </div>
        <div class="status-pill" id="statusPill">Ready</div>
      </header>

      <section class="controls" aria-label="Dashboard controls">
        <label>
          <span>Sport</span>
          <select id="sportSelect">
            <option value="nfl">NFL</option>
            <option value="mlb" selected>MLB</option>
            <option value="nba">NBA</option>
            <option value="mma">MMA</option>
            <option value="golf">Golf</option>
            <option value="nascar">NASCAR</option>
          </select>
        </label>

        <label>
          <span>Slate Type</span>
          <select id="slateTypeSelect">
            <option value="classic" selected>Classic</option>
            <option value="showdown">Showdown</option>
          </select>
        </label>

        <label>
          <span>Site</span>
          <select id="siteSelect">
            <option value="draftkings" selected>DraftKings</option>
            <option value="fanduel">FanDuel</option>
          </select>
        </label>

        <label>
          <span>Date</span>
          <input id="dateInput" type="date">
        </label>

        <label>
          <span>Contest Type</span>
          <select id="contestTypeSelect">
            <option value="single_entry" selected>Single Entry</option>
            <option value="small_field_gpp">Small-Field GPP</option>
            <option value="mid_field_gpp">Mid-Field GPP</option>
            <option value="large_field_gpp">Large-Field GPP</option>
            <option value="mini_max">Mini-MAX</option>
            <option value="winner_take_all">Winner Take All</option>
            <option value="cash">Cash</option>
          </select>
        </label>

        <label>
          <span>Contest Size</span>
          <input id="contestSizeInput" type="number" min="1" step="1" value="500">
        </label>

        <button id="scanButton" type="button">Scan / Refresh</button>
      </section>

      <section class="search-row" aria-label="Player search">
        <input id="searchInput" type="search" placeholder="Search player, team, position, tag, or warning">
        <button id="reloadButton" type="button">Reload Table</button>
      </section>

      <nav class="tabs" aria-label="Dashboard tables">
        <button class="tab active" data-route="top-upside" type="button">Top Upside</button>
        <button class="tab" data-route="leverage" type="button">Leverage</button>
        <button class="tab" data-route="fake-chalk" type="button">Fake Chalk</button>
        <button class="tab" data-route="single-entry" type="button">Single Entry</button>
        <button class="tab" data-route="contest-fit" type="button">Contest Fit</button>
        <button class="tab" data-route="showdown-captains" type="button">Showdown Captains</button>
        <button class="tab" data-route="showdown-flex" type="button">Showdown Flex</button>
      </nav>

      <section class="summary" aria-live="polite">
        <div>
          <span class="summary-label">Active View</span>
          <strong id="activeView">Top Upside</strong>
        </div>
        <div>
          <span class="summary-label">Rows</span>
          <strong id="rowCount">0</strong>
        </div>
        <div>
          <span class="summary-label">Last Updated</span>
          <strong id="lastUpdated">Never</strong>
        </div>
      </section>

      <section class="message hidden" id="messageBox"></section>

      <section class="table-wrap" aria-label="DFS player table">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="/public/dashboard.js"></script>
  </body>
</html>
